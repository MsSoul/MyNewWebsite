   <script>
// Inside your body.html script section:

function loadMainHeader() {
    // 1. Fetch and load the header file into its wrapper
    loadPageContent('header-wrapper-id', 'header.html'); 
    
    // 2. Wait a tiny fraction of a millisecond for the browser to parse the script, then run it!
    setTimeout(() => {
        if (typeof window.startMyTitleRotator === 'function') {
            window.startMyTitleRotator();
        } else {
            console.error("Rotator function is not defined yet.");
        }
    }, 50); 
}


        // =========================
        // LOAD HTML COMPONENTS
        // =========================
        async function loadHTML(id, file) {
            const res = await fetch(file);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
        }

        // Helper promise function to handle transition delays cleanly
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // =========================
        // LOAD PAGE CONTENT (SPA)
        // =========================
        async function loadPage(page) {
            const content = document.getElementById('content');

            // 1. Trigger the out-transition if it's an interior page switch
            if (content.innerHTML.trim() !== "") {
                content.classList.add('fade-out');
                await sleep(180); // Wait for fade out animation to finish cleanly
            }

            const res = await fetch('pages/' + page);
            const htmlText = await res.text();

            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');

            const bodyContent = doc.body ? doc.body.innerHTML : htmlText;

            // Load styles dynamically
            const stylePromises = [];

            doc.querySelectorAll('link[rel="stylesheet"]').forEach(sheet => {
                const href = sheet.getAttribute('href');

                if (!document.querySelector(`link[href="${href}"]`)) {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = href;

                    stylePromises.push(new Promise(resolve => {
                        link.onload = resolve;
                    }));

                    document.head.appendChild(link);
                }
            });

            await Promise.all(stylePromises);

            // Hide visibility while swapping raw content string to avoid layout shifting flashes
            content.style.visibility = 'hidden';
            content.innerHTML = bodyContent;
            content.style.visibility = 'visible';

            // Execute scripts inside loaded page
            doc.querySelectorAll('script').forEach(oldScript => {
                const newScript = document.createElement('script');

                if (oldScript.src) {
                    newScript.src = oldScript.src;
                } else {
                    newScript.textContent = oldScript.textContent;
                }

                document.body.appendChild(newScript);
                newScript.remove();
            });

            // ACTIVE NAV STATE
            document.querySelectorAll('nav a').forEach(link => {
                link.classList.toggle(
                    'active',
                    link.getAttribute('data-page') === page
                );
            });

            // IMPORTANT: enable dropdown scroll after load
            enableDropdownScroll();

            // 2. Clear out class to run incoming crisp step transition smoothly
            requestAnimationFrame(() => {
                content.classList.remove('fade-out');
            });
        }

        // ==========================================
        // ROUTING SYSTEM (NEW: URL Hash Management)
        // ==========================================
        async function handleRouting() {
            const hash = window.location.hash; // e.g., "#skills"
            let targetLink = document.querySelector(`nav a[href="${hash}"]`);
            
            // If the hash matches nothing or is completely empty, look for the current active nav element or default to aboutme
            if (!targetLink) {
                targetLink = document.querySelector('nav a.active') || document.querySelector('nav a[href="#aboutme"]');
            }

            if (targetLink) {
                const page = targetLink.getAttribute('data-page');
                if (page) {
                    await loadPage(page);
                }
            }
        }

        // Listen for back/forward browser buttons or mid-session URL changes
        window.addEventListener('hashchange', handleRouting);

        // ==========================================
        // NAV CLICK HANDLER (UPDATED)
        // ==========================================
        document.addEventListener('click', (e) => {
            const link = e.target.closest('nav a');
            if (!link) return;

            // REMOVED e.preventDefault() and direct loadPage() call here.
            // Let the native browser update the URL hash naturally. 
            // The 'hashchange' listener above handles executing the logic.
        });

        // =========================
        // DROPDOWN SECTION SCROLL
        // =========================
        function enableDropdownScroll() {
            document.querySelectorAll('.dropdown-menu a').forEach(link => {
                link.addEventListener('click', async function (e) {
                    e.preventDefault();

                    const id = this.getAttribute('data-scroll');

                    // reload page if needed
                    await loadPage('aboutme.html');

                    setTimeout(() => {
                        const target = document.getElementById(id);

                        if (!target) return;

                        // CLOSE all sections first
                        document.querySelectorAll('.aboutme-content section')
                            .forEach(sec => sec.classList.remove('active'));

                        // OPEN selected section
                        target.classList.add('active');

                        // scroll into view
                        target.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });

                    }, 200); 
                });
            });
        }

        // =========================
        // INIT
        // =========================
        async function init() {
            // Load structural components first
            await loadHTML('header', 'header.html');
            await loadHTML('footer', 'footer.html');

            // NEW: Run the hash router once layout files are fully appended 
            await handleRouting();

            const loader = document.getElementById('loader');
            if (loader) loader.style.display = 'none';
        }

        init();
    </script>
