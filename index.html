<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome to My Personal Website</title>
    <link rel="prefetch" href="body.html">
    <link rel="prefetch" href="header.html">
<link rel="prefetch" href="footer.html">
<link rel="prefetch" href="mycontact.html">
<link rel="prefetch" href="pages/aboutme.html">

<script defer src="/_vercel/insights/script.js"></script>

    <style>
        @font-face {
            font-family: 'Camaufalge';
            src: url('assets/Camaufalge.ttf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            font-family: 'Camaufalge', Arial, sans-serif;
            background: url('assets/me/cover1.PNG') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            letter-spacing: 0.5px; 
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.65);
            width: 100%;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            max-width: 1200px;
            width: 90%;
            padding: 40px;

            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 15px;

            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .welcome {
            flex: 2;
            color: white;
            text-align: center;
            padding: 30px;
        }

        .welcome h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .welcome p {
            font-size: 30px;
            margin-bottom: 30px;
        }

        .welcome button {
            padding: 16px 35px;
            font-size: 20px;
            font-family: 'Camaufalge', Arial, sans-serif;
            background-color: #f37373;
            color: white;
            border: none;
            border-radius: 10px;

            cursor: pointer;
            transition: background 0.3s;
        }

        .welcome button:hover {
            background-color: rgb(236, 171, 171);
        }

        .image-side {
            flex: 1.3;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-side img {
            width: 100%;
            max-width: 420px;
            height: auto;
            border: none;
        }

        .welcome button {
            position: relative;
            padding: 16px 35px;
            font-size: 20px;
            font-family: 'Camaufalge', Arial, sans-serif;
            background-color: #f37373;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden; /* Keeps the spinning light inside the button shape */
            z-index: 1;
            transition: color 0.3s, box-shadow 0.3s;
        }

        /* The moving pink light layer (UPGRADED) */
        .welcome button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            /* Uses ultra-bright neon hot pinks and a wider gradient arc (60% instead of 30%) */
            background: conic-gradient(transparent, #ff1493, #ff69b4, transparent 60%);
            animation: rotateLight 1.5s linear infinite; /* Slightly faster for energy */
            opacity: 0; 
            transition: opacity 0.3s;
            z-index: -2;
        }

        /* The inner button body mask */
        .welcome button::after {
            content: '';
            position: absolute;
            inset: 4px; /* Increased to 4px to make the light track thicker and more visible */
            background-color: #f37373;
            border-radius: 7px; 
            z-index: -1;
            transition: background-color 0.3s;
        }

        /* Hover States */
        .welcome button:hover::before {
            opacity: 1; 
        }

        .welcome button:hover {
            /* Adds a powerful neon outer glow on hover */
            box-shadow: 0 0 20px #ff1493, 0 0 40px rgba(255, 20, 147, 0.4);
        }

        .welcome button:hover::after {
            /* Kept slightly darker on hover so the bright neon border stands out clearly */
            background-color: #e56363; 
        }

        /* Animation for the spinning border light */
        @keyframes rotateLight {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="overlay">
        <div class="container">

            <div class="welcome">
                <h1>Hi, I'm Pretzil</h1>

                <p>
                    Welcome to my personal website! Here, you can explore my background, 
                    skills, academic journey, and recent activities.
                </p>

                <button onclick="location.href='body.html'">
                CLICK TO KNOW ME BETTER
                </button>
            </div>

            <div class="image-side">
                <img src="assets/me/me2.png" alt="Pretzil">
            </div>

        </div>
    </div>

    <div id="footer"></div>

</body>

</html>
