<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome to My Personal Website</title>
    <link rel="prefetch" href="body.html">
    <link rel="prefetch" href="header.html">
    <link rel="prefetch" href="footer.html">
    <link rel="prefetch" href="mycontact.html">
    <link rel="prefetch" href="pages/aboutme.html">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script defer src="/_vercel/insights/script.js"></script>

    <style>
        @font-face {
            font-family: 'Camaufalge';
            src: url('assets/Camaufalge.ttf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            font-family: 'Camaufalge', Arial, sans-serif;
            background: url('assets/me/cover1.PNG') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            letter-spacing: 0.5px; 
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.65);
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            max-width: 1200px;
            width: 90%;
            padding: 40px;
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .welcome {
            flex: 2;
            color: white;
            text-align: center;
            padding: 30px;
        }

        .welcome h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .welcome p {
            font-size: 30px;
            margin-bottom: 30px;
        }

        .welcome button {
            position: relative;
            padding: 16px 35px;
            font-size: 20px;
            font-family: 'Camaufalge', Arial, sans-serif;
            background-color: #f37373;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
            transition: color 0.3s, box-shadow 0.3s;
        }

        /* The moving pink light layer */
        .welcome button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, #ff1493, #ff69b4, transparent 60%);
            animation: rotateLight 1.5s linear infinite;
            opacity: 0; 
            transition: opacity 0.3s;
            z-index: -2;
        }

        /* The inner button body mask */
        .welcome button::after {
            content: '';
            position: absolute;
            inset: 4px;
            background-color: #f37373;
            border-radius: 7px; 
            z-index: -1;
            transition: background-color 0.3s;
        }

        /* Hover States */
        .welcome button:hover::before {
            opacity: 1; 
        }

        .welcome button:hover {
            box-shadow: 0 0 20px #ff1493, 0 0 40px rgba(255, 20, 147, 0.4);
        }

        .welcome button:hover::after {
            background-color: #e56363; 
        }

        /* Animation for the spinning border light */
        @keyframes rotateLight {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #knowBtn {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity .5s ease, transform .5s ease;
        }

        #knowBtn.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Social Icons Wrapper */
        .social-icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity .5s ease, transform .5s ease;
        }

        .social-icons.show {
            opacity: 1;
            transform: translateY(0);
        }

        .social-icons a, .email-container {
            color: white;
            font-size: 32px;
            transition: color 0.3s, transform 0.3s;
            cursor: pointer;
            text-decoration: none;
        }

        .social-icons a:hover, .email-container:hover {
            color: #f37373;
            transform: scale(1.15);
        }

        /* Email Tooltip Styling */
        .email-container {
            position: relative;
            display: inline-block;
        }


        /* Typing Effect blinkers */
        #typing-title::after,
        #typing-text::after {
            content: "|";
            animation: blink .8s infinite;
            color: #f37373;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .image-side {
            flex: 1.3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-side img {
            width: 100%;
            max-width: 420px;
            height: auto;
            border: none;
        }
    </style>
</head>

<body>

    <div class="overlay">
        <div class="container">

            <div class="welcome">
                <h1 id="typing-title"></h1>
                <p id="typing-text"></p>

                <button id="knowBtn" onclick="location.href='body.html'">
                    CLICK TO KNOW ME BETTER
                </button>

                <div id="socialLinks" class="social-icons">
                    <a href="https://www.linkedin.com/in/pjvivares0910" target="_blank" title="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="https://github.com/MsSoul" target="_blank" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <div class="email-container" id="emailWrapper" onclick="copyEmail()" title="Click to copy email">
                        <i class="fas fa-envelope" id="emailIcon"></i>
                    </div>
                </div>
            </div>

            <div class="image-side">
                <img src="assets/me/me2.png" alt="Pretzil">
            </div>

        </div>
    </div>

    <div id="footer"></div>

</body>

<script>
const title = "Hi, I'm Pretzil!";
const message = "Welcome to my personal website! Here, you can explore my background, projects, academic journey, and recent activities.";

const titleElement = document.getElementById("typing-title");
const messageElement = document.getElementById("typing-text");
const button = document.getElementById("knowBtn");
const socialLinks = document.getElementById("socialLinks");

let i = 0;
let j = 0;

function typeTitle() {
    if (i < title.length) {
        titleElement.textContent += title.charAt(i);
        i++;
        setTimeout(typeTitle, 90);
    } else {
        setTimeout(typeMessage, 300);
    }
}

function typeMessage() {
    if (j < message.length) {
        messageElement.textContent += message.charAt(j);
        j++;
        setTimeout(typeMessage, 30);
    } else {
        // Show the button and social links together
        button.classList.add("show");
        socialLinks.classList.add("show");

        // Wait before restarting
        setTimeout(resetTyping, 4000); // Bumped to 4s so users have time to see/click links
    }
}

function resetTyping() {
    titleElement.textContent = "";
    messageElement.textContent = "";
    i = 0;
    j = 0;
    typeTitle();
}

// Function to copy email address
function copyEmail() {
    const emailText = "pjvivares0910@gmail.com"; 
    const wrapper = document.getElementById("emailWrapper");
    const icon = document.getElementById("emailIcon");

    navigator.clipboard.writeText(emailText).then(() => {
        // Change the hover title text
        wrapper.setAttribute("title", "Copied!");
        
        // Transform email envelope icon to a green checkmark
        icon.className = "fas fa-check";
        icon.style.color = "#73f373"; 

        // Reset title and icon back to normal after 2 seconds
        setTimeout(() => {
            wrapper.setAttribute("title", "Click to copy email");
            icon.className = "fas fa-envelope";
            icon.style.color = "";
        }, 2000);
    }).catch(err => {
        console.error('Failed to copy text: ', err);
    });
}

window.onload = typeTitle;
</script>

</html>
