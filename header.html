<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pretzil Joy Vivares</title>

    <link rel="preload" as="image" href="assets/me/meee.jpg">
    <link rel="prefetch" href="pages/aboutme.html">
    <link rel="prefetch" href="pages/skills.html">
    <link rel="prefetch" href="pages/experience.html">
    <link rel="prefetch" href="pages/trainings.html">
    <link rel="prefetch" href="pages/projects.html">
    <link rel="prefetch" href="pages/activities.html">
    <link rel="stylesheet" href="header.css">
</head>

<body>

    <header>
        <img src="assets/me/me.jpg" alt="Pretzil Joy Vivares">
        <h1>Pretzil Joy Vivares</h1>
        <div class="title-container">
    <div class="title-slider" id="title-slider">
        <div class="title-item">Software Developer</div>
        <div class="title-item">Junior Android Application Developer</div>
        <div class="title-item">Junior Full-Stack Developer</div>
        <div class="title-item">Junior QA Tester</div>
    </div>
</div>
        <div id="contact-info"></div>
    </header>

    <nav>
        <a href="#aboutme" data-page="aboutme.html" class="active">About Me</a>
        <a href="#skills" data-page="skills.html">Skills</a>
        <a href="#experience" data-page="experience.html">Work Experience</a>
        <a href="#trainings" data-page="trainings.html">Trainings & Seminars</a>
        <a href="#projects" data-page="projects.html">My Projects</a>
        <a href="#activities" data-page="activities.html">Recent Activities</a>
    </nav>

    <main id="content"></main>

    <script>
        function loadPageContent(targetId, url) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`Could not fetch ${url}`);
                    return response.text();
                })
                .then(html => {
                    document.getElementById(targetId).innerHTML = html;

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const scripts = doc.querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        newScript.textContent = script.textContent;
                        document.body.appendChild(newScript).remove();
                    });
                })
                .catch(error => {
                    document.getElementById(targetId).innerHTML = `<p style="color:red;">Error loading requested layout space.</p>`;
                    console.error('Layout Error:', error);
                });
        }

        // Load contact info permanently inside header slot right away
        loadPageContent('contact-info', 'mycontact.html');

        // NEW function: Checks the URL hash and loads the correct page
        function handleRouting() {
            const hash = window.location.hash; // e.g., "#skills"
            let targetLink = document.querySelector(`nav a[href="${hash}"]`);
            
            // Default to aboutme if hash is empty or doesn't match any link
            if (!targetLink) {
                targetLink = document.querySelector('nav a[href="#aboutme"]');
            }

            if (targetLink) {
                // Update active states
                document.querySelectorAll('nav a').forEach(nav => nav.classList.remove('active'));
                targetLink.classList.add('active');

                // Pull data page routing pathway
                const page = targetLink.getAttribute('data-page');
                loadPageContent('content', page);
            }
        }

        // Run routing on initial startup
        handleRouting();

        // Also listen for back/forward browser buttons or mid-session URL changes
        window.addEventListener('hashchange', handleRouting);

// Global interval tracker to prevent multiple duplicate loops
window.rotatorInterval = null;

// The universal function you will call from body.html
window.startMyTitleRotator = function() {
    const slider = document.getElementById('title-slider');
    const items = document.querySelectorAll('.title-item');
    
    // Stop if elements aren't injected into the page yet
    if (!slider || items.length === 0) {
        console.warn("Slider elements not found yet.");
        return;
    }

    // Clear any existing intervals to prevent it from spinning out of control
    if (window.rotatorInterval) clearInterval(window.rotatorInterval);

    let currentIndex = 0;

    window.rotatorInterval = setInterval(() => {
        currentIndex = (currentIndex + 1) % items.length;
        
        // Moves the slider up cleanly by 30px intervals matching your CSS height
        const shiftValue = currentIndex * 30; 
        slider.style.transform = `translateY(-${shiftValue}px)`;
    }, 1000); // 1 second auto-rotation
};
    </script>
</body>
</html>
